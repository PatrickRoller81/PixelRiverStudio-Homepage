<svg width="400" height="420" viewBox="0 0 400 420" xmlns="http://www.w3.org/2000/svg">

  <!-- Chip Outline -->
  <rect x="80" y="40" width="240" height="240" rx="40" fill="none" stroke="#1E88E5" stroke-width="8"></rect>

  <!-- Chip Pins -->
  <!-- Top -->
  <g stroke="#1E88E5" stroke-width="6">
    <line x1="120" y1="40" x2="120" y2="20"></line>
    <line x1="160" y1="40" x2="160" y2="20"></line>
    <line x1="200" y1="40" x2="200" y2="20"></line>
    <line x1="240" y1="40" x2="240" y2="20"></line>
    <line x1="280" y1="40" x2="280" y2="20"></line>
  </g>

  <!-- Bottom -->
  <g stroke="#1E88E5" stroke-width="6">
    <line x1="120" y1="280" x2="120" y2="300"></line>
    <line x1="160" y1="280" x2="160" y2="300"></line>
    <line x1="200" y1="280" x2="200" y2="300"></line>
    <line x1="240" y1="280" x2="240" y2="300"></line>
    <line x1="280" y1="280" x2="280" y2="300"></line>
  </g>

  <!-- River (Main Shape) -->
  <path d="M200 70
           C160 120, 240 150, 200 200
           C160 250, 240 270, 200 290" fill="none" stroke="#1E88E5" stroke-width="18" stroke-linecap="round"></path>

  <!-- Secondary River Line -->
  <path d="M210 80
           C180 120, 260 150, 210 200
           C170 250, 250 270, 210 290" fill="none" stroke="#90CAF9" stroke-width="8" stroke-linecap="round"></path>

  <!-- Pixel Squares -->
  <rect x="140" y="140" width="10" height="10" fill="#1E88E5"></rect>
  <rect x="155" y="160" width="8" height="8" fill="#1E88E5"></rect>
  <rect x="170" y="180" width="6" height="6" fill="#1E88E5"></rect>

  <!-- Text -->
  <text x="200" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" fill="#1E88E5" font-weight="600">
        PixelRiver
  </text>

  <text x="200" y="390" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#e2e8f0">
        Studio
  </text>

</svg>
